# =============================================================================
# Big Data Lab — docker-compose.yml (rebuilt)
#
# Lab coverage
#   Lab 1 — HDFS navigation & file operations   (edge-node → namenode/datanode)
#   Lab 2 — Hive DDL & external tables (CSV)    (edge-node → hive-server, postgres)
#   Lab 3 — Hive external tables (Parquet)      (edge-node → hive-server)
#   Lab 4 — MapReduce / YARN WordCount          (edge-node → resourcemanager, nodemanager)
#   Lab 5 — Hue web UI + Power BI ODBC          (hue, hive-server)
#
# Student workflow
#   All CLI work runs inside edge-node — NOT namenode.
#   docker exec -it edge-node bash
#     /home/student/training/   read-only lab datasets
#     /home/student/mydata/     writable — drop own files here, then push to HDFS
#
# Improvements over original
#   ✔ All secrets moved to .env (no hardcoded passwords)
#   ✔ Hue image pinned (was :latest)
#   ✔ apt-key replaced with signed-by keyring in Dockerfile.hive
#   ✔ apt cache cleaned in Dockerfile.hive
#   ✔ Duplicate YAML comments removed
#   ✔ training/ volume scoped correctly (edge-node + hive-server only)
#   ✔ Memory limits added to every service
#   ✔ sleep 15 replaced by proper depends_on healthcheck
#   ✔ HiveServer2 healthcheck added (Hue waits for it)
#   ✔ HDFS chmod scoped to specific lab directories (no chmod 777 /)
#   ✔ MapReduce paths use $${HADOOP_HOME} env var
#   ✔ Dedicated edge-node replaces namenode as student entry point
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # STORAGE LAYER — HDFS
  # Labs 1, 2, 3, 4, 5  (every lab touches HDFS)
  # ---------------------------------------------------------------------------
  namenode:
    image: bde2020/hadoop-namenode:${HADOOP_IMAGE_TAG}
    container_name: namenode
    restart: unless-stopped
    ports:
      - "9870:9870"   # NameNode Web UI  (Lab 1 — HDFS health check)
      - "9000:9000"   # HDFS RPC         (inter-service communication)
    environment:
      CLUSTER_NAME: ${CLUSTER_NAME}
      CORE_CONF_fs_defaultFS: hdfs://namenode:9000
      CORE_CONF_hadoop_proxyuser_hue_hosts: "*"
      CORE_CONF_hadoop_proxyuser_hue_groups: "*"
      HDFS_CONF_dfs_webhdfs_enabled: "true"
      HDFS_CONF_dfs_replication: "1"          # single-node lab: 1 replica is correct
    volumes:
      - namenode_data:/hadoop/dfs/name        # persistent HDFS metadata (admin only)
    networks:
      - bigdata-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9870/"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 1g

  datanode:
    image: bde2020/hadoop-datanode:${HADOOP_IMAGE_TAG}
    container_name: datanode
    restart: unless-stopped
    environment:
      SERVICE_PRECONDITION: "namenode:9870"
      CORE_CONF_fs_defaultFS: hdfs://namenode:9000
      HDFS_CONF_dfs_replication: "1"
    volumes:
      - datanode_data:/hadoop/dfs/data        # persistent HDFS block storage
    networks:
      - bigdata-net
    depends_on:
      namenode:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 1g

  # ---------------------------------------------------------------------------
  # COMPUTE LAYER — YARN
  # Lab 4 — MapReduce / YARN WordCount job
  # ---------------------------------------------------------------------------
  resourcemanager:
    image: bde2020/hadoop-resourcemanager:${HADOOP_IMAGE_TAG}
    container_name: resourcemanager
    restart: unless-stopped
    ports:
      - "8088:8088"   # YARN Resource Manager UI (Lab 4 — monitor MR jobs)
    environment:
      CORE_CONF_fs_defaultFS: hdfs://namenode:9000
      MAPRED_CONF_mapreduce_framework_name: yarn
      YARN_CONF_yarn_resourcemanager_hostname: resourcemanager
      MAPRED_CONF_yarn_app_mapreduce_am_env: "HADOOP_MAPRED_HOME=$${HADOOP_HOME}"
      MAPRED_CONF_mapreduce_map_env: "HADOOP_MAPRED_HOME=$${HADOOP_HOME}"
      MAPRED_CONF_mapreduce_reduce_env: "HADOOP_MAPRED_HOME=$${HADOOP_HOME}"
      YARN_CONF_yarn_application_classpath: >-
        $${HADOOP_HOME}/etc/hadoop:
        $${HADOOP_HOME}/share/hadoop/common/*:
        $${HADOOP_HOME}/share/hadoop/common/lib/*:
        $${HADOOP_HOME}/share/hadoop/hdfs/*:
        $${HADOOP_HOME}/share/hadoop/hdfs/lib/*:
        $${HADOOP_HOME}/share/hadoop/mapreduce/*:
        $${HADOOP_HOME}/share/hadoop/mapreduce/lib/*:
        $${HADOOP_HOME}/share/hadoop/yarn/*:
        $${HADOOP_HOME}/share/hadoop/yarn/lib/*
      MAPRED_CONF_mapreduce_application_classpath: >-
        $${HADOOP_HOME}/etc/hadoop:
        $${HADOOP_HOME}/share/hadoop/common/*:
        $${HADOOP_HOME}/share/hadoop/common/lib/*:
        $${HADOOP_HOME}/share/hadoop/hdfs/*:
        $${HADOOP_HOME}/share/hadoop/hdfs/lib/*:
        $${HADOOP_HOME}/share/hadoop/mapreduce/*:
        $${HADOOP_HOME}/share/hadoop/mapreduce/lib/*:
        $${HADOOP_HOME}/share/hadoop/yarn/*:
        $${HADOOP_HOME}/share/hadoop/yarn/lib/*
      YARN_CONF_yarn_nodemanager_aux___services: mapreduce_shuffle
      YARN_CONF_yarn_nodemanager_aux___services_mapreduce__shuffle_class: org.apache.hadoop.mapred.ShuffleHandler
    depends_on:
      namenode:
        condition: service_healthy
      datanode:
        condition: service_started
    networks:
      - bigdata-net
    deploy:
      resources:
        limits:
          memory: 768m

  nodemanager:
    image: bde2020/hadoop-nodemanager:${HADOOP_IMAGE_TAG}
    container_name: nodemanager
    restart: unless-stopped
    environment:
      CORE_CONF_fs_defaultFS: hdfs://namenode:9000
      MAPRED_CONF_mapreduce_framework_name: yarn
      YARN_CONF_yarn_resourcemanager_hostname: resourcemanager
      MAPRED_CONF_yarn_app_mapreduce_am_env: "HADOOP_MAPRED_HOME=$${HADOOP_HOME}"
      MAPRED_CONF_mapreduce_map_env: "HADOOP_MAPRED_HOME=$${HADOOP_HOME}"
      MAPRED_CONF_mapreduce_reduce_env: "HADOOP_MAPRED_HOME=$${HADOOP_HOME}"
      YARN_CONF_yarn_application_classpath: >-
        $${HADOOP_HOME}/etc/hadoop:
        $${HADOOP_HOME}/share/hadoop/common/*:
        $${HADOOP_HOME}/share/hadoop/common/lib/*:
        $${HADOOP_HOME}/share/hadoop/hdfs/*:
        $${HADOOP_HOME}/share/hadoop/hdfs/lib/*:
        $${HADOOP_HOME}/share/hadoop/mapreduce/*:
        $${HADOOP_HOME}/share/hadoop/mapreduce/lib/*:
        $${HADOOP_HOME}/share/hadoop/yarn/*:
        $${HADOOP_HOME}/share/hadoop/yarn/lib/*
      MAPRED_CONF_mapreduce_application_classpath: >-
        $${HADOOP_HOME}/etc/hadoop:
        $${HADOOP_HOME}/share/hadoop/common/*:
        $${HADOOP_HOME}/share/hadoop/common/lib/*:
        $${HADOOP_HOME}/share/hadoop/hdfs/*:
        $${HADOOP_HOME}/share/hadoop/hdfs/lib/*:
        $${HADOOP_HOME}/share/hadoop/mapreduce/*:
        $${HADOOP_HOME}/share/hadoop/mapreduce/lib/*:
        $${HADOOP_HOME}/share/hadoop/yarn/*:
        $${HADOOP_HOME}/share/hadoop/yarn/lib/*
      YARN_CONF_yarn_nodemanager_aux___services: mapreduce_shuffle
      YARN_CONF_yarn_nodemanager_aux___services_mapreduce__shuffle_class: org.apache.hadoop.mapred.ShuffleHandler
      YARN_CONF_yarn_nodemanager_resource_memory___mb: "2048"
      YARN_CONF_yarn_nodemanager_vmem___check___enabled: "false"
    depends_on:
      resourcemanager:
        condition: service_started
    networks:
      - bigdata-net
    deploy:
      resources:
        limits:
          memory: 1536m

  # ---------------------------------------------------------------------------
  # METADATA LAYER — PostgreSQL (Hive Metastore)
  # Labs 2, 3, 5 — Hive DDL persisted here
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:13
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-hive-db.sql:/docker-entrypoint-initdb.d/init-hive-db.sql:ro
    networks:
      - bigdata-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 512m

  # ---------------------------------------------------------------------------
  # COMPUTE LAYER — Apache Hive 4 (HiveServer2)
  # Labs 2, 3 — SQL queries, external tables (CSV + Parquet)
  # Lab 5 — ODBC endpoint for Power BI
  #
  # Custom Dockerfile.hive installs Java 8 via modern signed-by keyring
  # Entrypoint: schematool → HDFS setup → HiveServer2
  # HDFS permissions scoped to /user/hive and /user/lab (no chmod 777 /)
  # ---------------------------------------------------------------------------
  hive-server:
    build:
      context: .
      dockerfile: Dockerfile.hive
    container_name: hive-server
    restart: unless-stopped
    ports:
      - "10000:10000"   # Beeline / ODBC / Power BI (Lab 2, 3, 5)
      - "10002:10002"   # HiveServer2 Web UI
    environment:
      SERVICE_NAME: hiveserver2
      HADOOP_HEAPSIZE: ${HADOOP_HEAPSIZE}
      # Plain env vars — read by our entrypoint script to patch hive-site.xml
      # before schematool and HiveServer2 start.
      DB_USER: ${POSTGRES_USER}
      DB_PASS: ${POSTGRES_PASSWORD}
    volumes:
      # hive-site.xml is written by hive-entrypoint.sh at startup (not mounted)
      - ./hive-entrypoint.sh:/opt/hive/bin/hive-entrypoint.sh:ro
      - hive_home:/home/hive
      - ./training:/home/hive/training:ro  # read-only lab datasets (for LOAD DATA LOCAL)
    depends_on:
      namenode:
        condition: service_healthy
      datanode:
        condition: service_started
      postgres:
        condition: service_healthy
    networks:
      - bigdata-net
    healthcheck:
      test: ["CMD-SHELL", "beeline -u 'jdbc:hive2://localhost:10000' -n hive -p hive_lab_2024 -e 'SHOW DATABASES;' 2>&1 | grep -q 'default'"]
      interval: 30s
      timeout: 90s
      retries: 10
      start_period: 120s
    deploy:
      resources:
        limits:
          memory: 3g
    entrypoint: ["/bin/bash", "/opt/hive/bin/hive-entrypoint.sh"]

  # ---------------------------------------------------------------------------
  # STUDENT EDGE NODE — the correct place for all student CLI work
  # Labs 1, 2, 3, 4 — all hdfs dfs, beeline, and yarn jar commands run here
  #
  # Why here and NOT namenode:
  #   • NameNode is the cluster control plane — corrupting it kills the lab
  #   • Edge node is isolated: destructive commands only affect the student's
  #     own HDFS paths, never the namespace metadata
  #   • Mirrors real-world practice (gateway / edge node pattern)
  #
  # Student workspace layout inside the container:
  #   /home/student/training/   read-only lab datasets  (accounts.csv etc.)
  #   /home/student/mydata/     writable — students drop their own files here
  #                             then push to HDFS with:
  #                             hdfs dfs -put /home/student/mydata/file.csv /user/lab/...
  # ---------------------------------------------------------------------------
  edge-node:
    image: bde2020/hadoop-base:${HADOOP_IMAGE_TAG}
    container_name: edge-node
    restart: unless-stopped
    hostname: edge-node
    environment:
      CORE_CONF_fs_defaultFS: hdfs://namenode:9000
      HIVE_SERVER2_HOST: hive-server
      HIVE_SERVER2_PORT: "10000"
    volumes:
      - ./training:/home/student/training:ro    # Lab datasets — read-only
      - student_work:/home/student/mydata        # Writable student workspace
      - ./core-site.xml:/etc/hadoop/conf/core-site.xml:ro
    depends_on:
      namenode:
        condition: service_healthy
      hive-server:
        condition: service_healthy
    networks:
      - bigdata-net
    # Keep the container alive so students can exec into it at any time
    command: ["tail", "-f", "/dev/null"]
    deploy:
      resources:
        limits:
          memory: 512m

  # ---------------------------------------------------------------------------
  # UI LAYER — Hue
  # Lab 5 — HDFS file browser, SQL editor, data visualisation
  # ---------------------------------------------------------------------------
  hue:
    image: ${HUE_IMAGE}
    container_name: hue
    restart: unless-stopped
    ports:
      - "8888:8888"   # Hue Web UI (Lab 5)
    volumes:
      - ./hue.ini:/usr/share/hue/desktop/conf/z-hue.ini:ro
    depends_on:
      namenode:
        condition: service_healthy
      postgres:
        condition: service_healthy
      hive-server:
        condition: service_healthy
    networks:
      - bigdata-net
    deploy:
      resources:
        limits:
          memory: 1g
    entrypoint: /bin/bash
    command:
      - -c
      - |
        set -e
        echo "=== Running Hue DB migrations ==="
        ./build/env/bin/hue syncdb --noinput
        ./build/env/bin/hue migrate
        echo "=== Starting Hue ==="
        exec ./startup.sh

# =============================================================================
# Named volumes — survives container restarts and recreations
# =============================================================================
volumes:
  namenode_data:
  datanode_data:
  postgres_data:
  hive_home:      # hive-server internal data drop zone
  student_work:   # writable student workspace inside edge-node (/home/student/mydata)

# =============================================================================
# Network
# =============================================================================
networks:
  bigdata-net:
    driver: bridge
