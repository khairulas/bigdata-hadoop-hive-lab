# =============================================================================
# hue.ini — Hue web UI configuration (Lab 5)
#
# This file is mounted read-only into the hue container at:
#   /usr/share/hue/desktop/conf/z-hue.ini
# The "z-" prefix ensures it is loaded last, overriding Hue defaults.
#
# IMPORTANT: Replace secret_key with a random string before any deployment
# beyond a local laptop lab. Generate one with:
#   python3 -c "import secrets; print(secrets.token_hex(32))"
# =============================================================================

[desktop]

# Secret key for session cookies — change this for any shared/cloud deployment
secret_key=change_me_before_sharing_7x4k9mq2n8pz

# Accept requests from any host (fine for localhost lab; restrict in production)
allowed_hosts=*

# Use the same PostgreSQL instance as Hive metastore (separate 'hue' database)
[[database]]
engine=postgresql_psycopg2
host=postgres
port=5432
user=hive
password=hive_lab_2024      # must match POSTGRES_PASSWORD in .env
name=hue

[hadoop]

[[hdfs_clusters]]
[[[default]]]
# NameNode RPC for HDFS operations
fs_defaultfs=hdfs://namenode:9000

# WebHDFS REST API — used by Hue file browser (Lab 5: upload / browse HDFS)
webhdfs_url=http://namenode:9870/webhdfs/v1

# Impersonation — allows Hue to act as the logged-in student user in HDFS
hadoop_conf_dir=/etc/hadoop/conf

[[yarn_clusters]]
[[[default]]]
# YARN Resource Manager — enables Hue job browser (Lab 4: monitor MR jobs)
resourcemanager_host=resourcemanager
resourcemanager_port=8032
resourcemanager_api_url=http://resourcemanager:8088
proxy_api_url=http://resourcemanager:8088
history_server_api_url=http://resourcemanager:19888

[beeswax]
# Beeswax is Hue's internal Hive query editor connector
hive_server_host=hive-server
hive_server_port=10000

# Generous timeouts for lab machines that may be slow
server_conn_timeout=180
query_timeout=600

[hive]
# Auto-commit is required for DDL statements in Labs 2 and 3
autocommit=True
transaction=False

# Rows shown in Hue result grid — enough for all lab exercises
truncate_limit=5000
